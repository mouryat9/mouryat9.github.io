<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div class="footer__social">
        <a href="mailto:{{ site.email }}" aria-label="Email"><i class="fas fa-envelope"></i></a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="{{ site.google_scholar }}" target="_blank" aria-label="Google Scholar"><i class="fas fa-graduation-cap"></i></a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
      </div>
      <p class="footer__copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with Jekyll.</p>
    </div>
  </div>
</footer>
